<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neighborhood Nursery</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-green-50 text-gray-900">

  <header class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-xl font-bold">🌿 Nursery Store</h1>
    <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
  </header>

  <main class="p-4">
    <input id="search" placeholder="Search..." class="border p-2 mb-4 w-full" />

    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
